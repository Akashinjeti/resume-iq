<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResumeIQ — AI Resume Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affd4;
    --text: #e8e8f0;
    --muted: #7070a0;
    --success: #4ade80;
    --warning: #fbbf24;
    --danger: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,106,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255,106,155,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 60% 10%, rgba(106,255,212,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* Header */
  header {
    padding: 40px 0 20px;
    text-align: center;
    animation: fadeDown 0.7s ease both;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .logo-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s ease infinite;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 16px;
    font-weight: 300;
    margin-top: 10px;
    font-style: italic;
  }

  /* Upload Form */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin: 36px 0;
    animation: fadeUp 0.7s ease 0.1s both;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media(max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 8px; }
  .field.full { grid-column: 1 / -1; }

  label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  input[type="text"], input[type="password"], textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    resize: none;
  }

  input[type="text"]:focus, input[type="password"]:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
  }

  textarea { height: 130px; }

  /* File drop zone */
  .drop-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: rgba(124,106,255,0.05); }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .drop-icon {
    font-size: 28px;
    margin-bottom: 8px;
    display: block;
  }

  .drop-label {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
  }

  .drop-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .drop-chosen { font-size: 13px; color: var(--accent3); margin-top: 6px; font-weight: 500; }

  .btn-analyze {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #9b8bff);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-analyze:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-analyze:active { transform: translateY(0); }
  .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-analyze .btn-loading { display: none; }
  .btn-analyze.loading .btn-text { display: none; }
  .btn-analyze.loading .btn-loading { display: inline; }

  /* Loading bar */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
    display: none;
  }
  .progress-bar.active { display: block; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
    animation: shimmer 1.5s ease infinite;
  }

  /* Results */
  #results {
    animation: fadeUp 0.6s ease both;
    display: none;
  }

  /* Score Hero */
  .score-hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 36px;
    flex-wrap: wrap;
  }

  .score-ring {
    position: relative;
    width: 120px;
    height: 120px;
    flex-shrink: 0;
  }

  .score-ring svg { transform: rotate(-90deg); }

  .score-ring .track { fill: none; stroke: var(--border); stroke-width: 8; }
  .score-ring .fill {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 314;
    stroke-dashoffset: 314;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
  }

  .score-num {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
  }

  .score-num small { font-size: 11px; color: var(--muted); font-weight: 400; }

  .score-info { flex: 1; min-width: 200px; }

  .verdict-badge {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 20px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .score-summary {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    font-style: italic;
  }

  /* Section cards */
  .section-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media(max-width: 640px) { .section-grid { grid-template-columns: 1fr; } }

  .sec-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .sec-card.full { grid-column: 1 / -1; }

  .sec-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sec-title::before {
    content: '';
    width: 3px; height: 14px;
    border-radius: 2px;
    display: inline-block;
  }

  .sec-title.green { color: var(--success); }
  .sec-title.green::before { background: var(--success); }
  .sec-title.red { color: var(--danger); }
  .sec-title.red::before { background: var(--danger); }
  .sec-title.yellow { color: var(--warning); }
  .sec-title.yellow::before { background: var(--warning); }
  .sec-title.purple { color: var(--accent); }
  .sec-title.purple::before { background: var(--accent); }
  .sec-title.teal { color: var(--accent3); }
  .sec-title.teal::before { background: var(--accent3); }

  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }

  .tag {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid;
  }

  .tag.match { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: var(--success); }
  .tag.missing { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--danger); }
  .tag.tip { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); color: var(--warning); }

  .list-items { list-style: none; display: flex; flex-direction: column; gap: 10px; }

  .list-items li {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    padding-left: 16px;
    position: relative;
  }

  .list-items li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 11px;
  }

  /* Bullet improvements */
  .bullet-item {
    background: var(--surface);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }

  .bullet-label {
    font-size: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .bullet-label.orig { color: var(--muted); }
  .bullet-label.impr { color: var(--accent3); }

  .bullet-text { font-size: 13px; line-height: 1.5; }
  .bullet-arrow { text-align: center; color: var(--accent); font-size: 18px; margin: 6px 0; }

  /* Error */
  .error-box {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--danger);
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }

  /* Animations */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:none; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  @keyframes shimmer {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(60deg); }
  }

  footer {
    text-align: center;
    padding: 40px 0 32px;
    color: var(--muted);
    font-size: 12px;
  }

  .api-note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    text-align: center;
  }

  .api-note a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo"><span class="logo-dot"></span> Powered by Gemini AI <span class="logo-dot"></span></div>
    <h1>Resume<span>IQ</span></h1>
    <p class="subtitle">Drop your resume. Paste the job. Get brutally honest feedback.</p>
  </header>

  <div class="form-card">
    <div class="form-grid">
      <div class="field full">
        <label>Upload Resume (PDF)</label>
        <div class="drop-zone" id="dropZone">
          <input type="file" id="resumeFile" accept=".pdf" />
          <span class="drop-icon">📄</span>
          <div class="drop-label">Click or drag & drop your PDF</div>
          <div class="drop-sub">Only PDF files supported</div>
          <div class="drop-chosen" id="fileName"></div>
        </div>
      </div>

      <div class="field full">
        <label>Job Description</label>
        <textarea id="jobDesc" placeholder="Paste the full job description here — the more detail, the better the analysis..."></textarea>
      </div>

      <div class="field full">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="AIza..." />
        <p class="api-note">Get your free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a> — never stored.</p>
      </div>
    </div>

    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">
      <span class="btn-text">Analyze My Resume</span>
      <span class="btn-loading">Analyzing... ⚡</span>
    </button>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div id="results"></div>

  <footer>Built by Akash Kumar Injeti &nbsp;·&nbsp; ResumeIQ</footer>
</div>

<script>
  // File drag & drop
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('resumeFile');
  const fileName = document.getElementById('fileName');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) fileName.textContent = '✓ ' + fileInput.files[0].name;
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) { fileInput.files = e.dataTransfer.files; fileName.textContent = '✓ ' + f.name; }
  });

  function getScoreColor(score) {
    if (score >= 75) return '#4ade80';
    if (score >= 50) return '#fbbf24';
    return '#f87171';
  }

  function getVerdictStyle(verdict) {
    const map = {
      'Strong Match': { bg: 'rgba(74,222,128,0.15)', color: '#4ade80', border: 'rgba(74,222,128,0.4)' },
      'Good Match':   { bg: 'rgba(124,106,255,0.15)', color: '#9b8bff', border: 'rgba(124,106,255,0.4)' },
      'Partial Match':{ bg: 'rgba(251,191,36,0.15)', color: '#fbbf24', border: 'rgba(251,191,36,0.4)' },
      'Weak Match':   { bg: 'rgba(248,113,113,0.15)', color: '#f87171', border: 'rgba(248,113,113,0.4)' },
    };
    return map[verdict] || map['Partial Match'];
  }

  async function analyze() {
    const file = fileInput.files[0];
    const jd = document.getElementById('jobDesc').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();
    const errorBox = document.getElementById('errorBox');
    const btn = document.getElementById('analyzeBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    errorBox.style.display = 'none';

    if (!file) return showError('Please upload a PDF resume.');
    if (!jd || jd.length < 50) return showError('Please paste a job description (at least 50 characters).');
    if (!apiKey) return showError('Please enter your Gemini API key.');

    btn.disabled = true;
    btn.classList.add('loading');
    progressBar.classList.add('active');

    let prog = 0;
    const progInterval = setInterval(() => {
      prog = Math.min(prog + Math.random() * 15, 85);
      progressFill.style.width = prog + '%';
    }, 400);

    const formData = new FormData();
    formData.append('resume', file);
    formData.append('job_description', jd);
    formData.append('api_key', apiKey);

    try {
      const res = await fetch('/analyze', { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Analysis failed.');

      clearInterval(progInterval);
      progressFill.style.width = '100%';
      setTimeout(() => { progressBar.classList.remove('active'); progressFill.style.width = '0%'; }, 600);

      renderResults(data);
    } catch (err) {
      clearInterval(progInterval);
      progressBar.classList.remove('active');
      showError(err.message);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.textContent = '⚠ ' + msg;
    b.style.display = 'block';
  }

  function renderResults(d) {
    const results = document.getElementById('results');
    const color = getScoreColor(d.match_score);
    const vStyle = getVerdictStyle(d.verdict);
    const circumference = 314;
    const offset = circumference - (d.match_score / 100) * circumference;

    const bulletsHTML = (d.improved_bullets || []).map(b => `
      <div class="bullet-item">
        <div class="bullet-label orig">Original</div>
        <div class="bullet-text" style="color:var(--muted)">${b.original}</div>
        <div class="bullet-arrow">↓</div>
        <div class="bullet-label impr">Improved</div>
        <div class="bullet-text">${b.improved}</div>
      </div>
    `).join('');

    results.innerHTML = `
      <div class="score-hero">
        <div class="score-ring">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle class="track" cx="60" cy="60" r="50"/>
            <circle class="fill" id="scoreArc" cx="60" cy="60" r="50" stroke="${color}" stroke-dashoffset="${circumference}"/>
          </svg>
          <div class="score-num" style="color:${color}">
            <span id="scoreNum">0</span>
            <small>/100</small>
          </div>
        </div>
        <div class="score-info">
          <span class="verdict-badge" style="background:${vStyle.bg};color:${vStyle.color};border:1px solid ${vStyle.border}">${d.verdict}</span>
          <p class="score-summary">${d.summary}</p>
        </div>
      </div>

      <div class="section-grid">
        <div class="sec-card">
          <div class="sec-title green">Strengths</div>
          <ul class="list-items">${(d.strengths||[]).map(s=>`<li>${s}</li>`).join('')}</ul>
        </div>
        <div class="sec-card">
          <div class="sec-title red">Missing Skills</div>
          <ul class="list-items">${(d.missing_skills||[]).map(s=>`<li>${s}</li>`).join('')}</ul>
        </div>

        <div class="sec-card">
          <div class="sec-title purple">Matched Keywords</div>
          <div class="tag-list">${(d.keyword_matches||[]).map(k=>`<span class="tag match">${k}</span>`).join('')}</div>
        </div>
        <div class="sec-card">
          <div class="sec-title red">Missing Keywords</div>
          <div class="tag-list">${(d.missing_keywords||[]).map(k=>`<span class="tag missing">${k}</span>`).join('')}</div>
        </div>

        <div class="sec-card full">
          <div class="sec-title teal">Improved Bullet Points</div>
          ${bulletsHTML || '<p style="color:var(--muted);font-size:13px">No bullet points found to improve.</p>'}
        </div>

        <div class="sec-card full">
          <div class="sec-title yellow">ATS Optimization Tips</div>
          <div class="tag-list">${(d.ats_tips||[]).map(t=>`<span class="tag tip">${t}</span>`).join('')}</div>
        </div>
      </div>
    `;

    results.style.display = 'block';
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Animate score
    setTimeout(() => {
      document.getElementById('scoreArc').style.strokeDashoffset = offset;
      let count = 0;
      const target = d.match_score;
      const interval = setInterval(() => {
        count += Math.ceil(target / 40);
        if (count >= target) { count = target; clearInterval(interval); }
        document.getElementById('scoreNum').textContent = count;
      }, 30);
    }, 100);
  }
</script>
</body>
</html>
